name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Check HTML syntax
      run: |
        # Basic HTML validation
        if ! grep -q "<!DOCTYPE html" index.html; then
          echo "DOCTYPE not found"
          exit 1
        fi
        
        if ! grep -q "</html>" index.html; then
          echo "HTML closing tag not found"
          exit 1
        fi
        
        echo "HTML syntax validation passed"
        
    - name: Link check with exclusions
      uses: lycheeverse/lychee-action@v2
      continue-on-error: true
      with:
        args: --verbose --no-progress --exclude 'linkedin.com' --exclude 'formspree.io' --include-mail './**/*.html'
        fail: false
        
    - name: Check for sensitive data
      run: |
        # Check for exposed API keys (basic pattern)
        if grep -r "sk-or-[a-zA-Z0-9]" . --exclude-dir=.git --exclude="OPENROUTER_API_KEY" --exclude="process.env.OPENROUTER_API_KEY" --exclude="const API_KEY = process.env.OPENROUTER_API_KEY;"; then
          echo "Potential API key found in code!"
          exit 1
        fi
        echo "No exposed API keys detected"
        
    
